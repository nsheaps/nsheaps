---
name: generate-profile

on:
  workflow_dispatch:
  schedule:
    # Regenerate daily at 6am UTC
    - cron: '0 6 * * *'

concurrency:
  group: generate-profile
  cancel-in-progress: true

jobs:
  generate:
    name: Generate Profile Cards & README
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout as GitHub App
        id: checkout
        uses: nsheaps/github-actions/.github/actions/checkout-as-app@main
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate SVG cards
        env:
          GH_TOKEN: ${{ steps.checkout.outputs.token }}
        run: python .github/scripts/generate-cards.py

      - name: Generate README
        run: python .github/scripts/generate-readme.py

      - name: Commit and push updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: |
            chore: regenerate profile cards and README

            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          commit_user_name: ${{ steps.checkout.outputs.user-name }}
          commit_user_email: ${{ steps.checkout.outputs.user-email }}
          file_pattern: 'cards/*.svg cards/manifest.json README.md'
