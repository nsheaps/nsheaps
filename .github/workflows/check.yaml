---
name: check

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.event_name == 'push' && github.sha || format('{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout as GitHub App
        id: checkout
        if: ${{ secrets.AUTOMATION_GITHUB_APP_ID != '' }}
        uses: nsheaps/github-actions/.github/actions/checkout-as-app@main
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}
          fetch-depth: 0

      - name: Checkout Code (fallback)
        if: ${{ steps.checkout.conclusion == 'skipped' }}
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Run format
        id: format
        run: |
          set +e
          mise run format
          FORMAT_EXIT=$?

          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

          exit $FORMAT_EXIT
        continue-on-error: true

      - name: Commit and push formatting fixes
        if: steps.format.outputs.has_changes == 'true' && steps.checkout.conclusion == 'success' && !cancelled()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: |
            chore: `mise format`

            Triggered by: ${{ github.sha }}
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          commit_user_name: ${{ steps.checkout.outputs.user-name }}
          commit_user_email: ${{ steps.checkout.outputs.user-email }}

      - name: Fail if changes were made
        if: steps.format.outputs.has_changes == 'true' && !cancelled()
        run: |
          echo "Formatting changes were auto-committed. Re-running CI."
          exit 1
